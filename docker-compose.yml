version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb_data:/data/db
    networks:
      - inventory-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://admin:admin@mongodb:27017
      DATABASE_NAME: inventory_erp
      SECRET_KEY: your-super-secret-key-change-in-production
    depends_on:
      - mongodb
    networks:
      - inventory-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    networks:
      - inventory-net
    command: npm run dev

volumes:
  mongodb_data:

networks:
  inventory-net:
    driver: bridge
